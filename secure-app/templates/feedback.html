{% extends "base.html" %}
{% block content %}
<div class="card">
  <h1>Feedback</h1>
  <form method="post">
    <textarea name="message" rows="4" placeholder="Share your feedback"></textarea>
    <button type="submit">Submit Feedback</button>
  </form>
</div>
<div class="grid">
  {% for item in feedback_items %}
  <div class="card">
    <strong>{{ item[1] }}</strong>
    <p>{{ item[2]|safe if unsafe_render else item[2] }}</p>
  </div>
  {% endfor %}
</div>
{% endblock %}
