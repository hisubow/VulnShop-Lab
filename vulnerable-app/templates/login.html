{% extends "base.html" %}
{% block content %}
<div class="card">
  <h1>Login</h1>
  <form method="post">
    <label>Username</label>
    <input name="username" placeholder="alice">
    <label>Password</label>
    <input name="password" type="password" placeholder="alice123">
    <button type="submit">Login</button>
  </form>
</div>
{% endblock %}
