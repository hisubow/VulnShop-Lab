{% extends "base.html" %}
{% block content %}
<div class="card">
  <h1>Profile</h1>
  {% if user %}
    <p><strong>ID:</strong> {{ user[0] }}</p>
    <p><strong>Username:</strong> {{ user[1] }}</p>
    <p><strong>Role:</strong> {{ user[2] }}</p>
  {% else %}
    <p>No profile found.</p>
  {% endif %}
</div>
{% endblock %}
