{% extends "base.html" %}
{% block content %}
<div class="card">
  <h1>Product Search</h1>
  <form method="get">
    <input name="q" value="{{ q|safe if unsafe_render else q }}" placeholder="Try: keyboard">
    <button type="submit">Search</button>
  </form>
  {% if q %}<p>Search query: {{ q|safe if unsafe_render else q }}</p>{% endif %}
</div>
{% if products %}
<table class="table">
  <thead><tr><th>ID</th><th>Name</th><th>Price</th></tr></thead>
  <tbody>
  {% for p in products %}<tr><td>{{ p[0] }}</td><td>{{ p[1] }}</td><td>${{ p[2] }}</td></tr>{% endfor %}
  </tbody>
</table>
{% endif %}
{% endblock %}
